<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Uygulaması</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    header {
      padding: 24px;
      background: #5a4ba0;
      color: #fff;
    }

    header h1 { font-size: 22px; }
    header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 20px 24px;
      border-bottom: 1px solid #eee;
    }

    #new-task {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }
    #new-task:focus { border-color: #764ba2; }

    #add-btn {
      padding: 12px 20px;
      border: none;
      background: #764ba2;
      color: #fff;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    #add-btn:hover { background: #5a4ba0; }
    #add-btn:disabled { opacity: 0.5; cursor: default; }

    .filters {
      display: flex;
      gap: 6px;
      padding: 14px 24px 0;
    }
    .filters button {
      border: none;
      background: none;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
    }
    .filters button.active { background: #eee; color: #333; font-weight: 600; }

    ul { list-style: none; padding: 12px 24px; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f2f2f2;
    }

    li input[type="checkbox"] {
      width: 18px; height: 18px; cursor: pointer; accent-color: #764ba2;
    }

    li .text { flex: 1; font-size: 15px; color: #333; word-break: break-word; }
    li.done .text { text-decoration: line-through; color: #aaa; }

    li .del {
      border: none; background: none; color: #d33;
      font-size: 18px; cursor: pointer; opacity: 0.6;
    }
    li .del:hover { opacity: 1; }

    .empty { text-align: center; color: #aaa; padding: 30px 0; font-size: 14px; }
    .error { color: #d33; background: #fdecea; margin: 0 24px; padding: 10px 14px;
             border-radius: 8px; font-size: 13px; display: none; }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      border-top: 1px solid #eee;
      font-size: 13px;
      color: #888;
    }
    footer button {
      border: none; background: none; color: #d33;
      cursor: pointer; font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>📝 Yapılacaklar</h1>
      <p>Görevlerin Supabase bulut veritabanında saklanır.</p>
    </header>

    <div class="input-row">
      <input id="new-task" type="text" placeholder="Yeni görev yaz ve Enter'a bas..." autocomplete="off" />
      <button id="add-btn">Ekle</button>
    </div>

    <div id="error" class="error"></div>

    <div class="filters">
      <button data-filter="all" class="active">Tümü</button>
      <button data-filter="active">Aktif</button>
      <button data-filter="done">Tamamlanan</button>
    </div>

    <ul id="list"></ul>

    <footer>
      <span id="count">Yükleniyor...</span>
      <button id="clear-done">Tamamlananları temizle</button>
    </footer>
  </div>

  <!-- Supabase istemci kütüphanesi (CDN üzerinden) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // --- Supabase bağlantı bilgileri ---
    // Bu iki değer gizli değildir; tarayıcıda açıkça kullanılır.
    // Güvenlik, veritabanındaki RLS (Row Level Security) kuralları ile sağlanır.
    const SUPABASE_URL = "https://mobnfzdtacxplyqijiss.supabase.co";
    const SUPABASE_KEY = "sb_publishable_rsvoFWaKlOYn-g3vo6Pf7Q_xcJxxgxi";

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let todos = [];
    let filter = "all";

    const listEl = document.getElementById("list");
    const inputEl = document.getElementById("new-task");
    const countEl = document.getElementById("count");
    const errorEl = document.getElementById("error");
    const addBtn = document.getElementById("add-btn");

    function showError(msg) {
      errorEl.textContent = "Hata: " + msg;
      errorEl.style.display = "block";
    }
    function clearError() {
      errorEl.style.display = "none";
    }

    // Tüm görevleri veritabanından çek
    async function load() {
      const { data, error } = await sb
        .from("todos")
        .select("*")
        .order("created_at", { ascending: true });

      if (error) { showError(error.message); return; }
      clearError();
      todos = data;
      render();
    }

    async function addTodo(text) {
      text = text.trim();
      if (!text) return;
      addBtn.disabled = true;
      const { error } = await sb.from("todos").insert({ text });
      addBtn.disabled = false;
      if (error) { showError(error.message); return; }
      await load();
    }

    async function toggleTodo(id, done) {
      const { error } = await sb.from("todos").update({ done }).eq("id", id);
      if (error) { showError(error.message); return; }
      await load();
    }

    async function deleteTodo(id) {
      const { error } = await sb.from("todos").delete().eq("id", id);
      if (error) { showError(error.message); return; }
      await load();
    }

    async function clearDone() {
      const { error } = await sb.from("todos").delete().eq("done", true);
      if (error) { showError(error.message); return; }
      await load();
    }

    function render() {
      listEl.innerHTML = "";

      const visible = todos.filter((t) => {
        if (filter === "active") return !t.done;
        if (filter === "done") return t.done;
        return true;
      });

      if (visible.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Burada hiç görev yok.";
        listEl.appendChild(empty);
      }

      visible.forEach((t) => {
        const li = document.createElement("li");
        if (t.done) li.classList.add("done");

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = t.done;
        cb.addEventListener("change", () => toggleTodo(t.id, cb.checked));

        const span = document.createElement("span");
        span.className = "text";
        span.textContent = t.text;

        const del = document.createElement("button");
        del.className = "del";
        del.textContent = "×";
        del.title = "Sil";
        del.addEventListener("click", () => deleteTodo(t.id));

        li.append(cb, span, del);
        listEl.appendChild(li);
      });

      const remaining = todos.filter((t) => !t.done).length;
      countEl.textContent = remaining + " görev kaldı";
    }

    addBtn.addEventListener("click", () => {
      addTodo(inputEl.value);
      inputEl.value = "";
      inputEl.focus();
    });

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        addTodo(inputEl.value);
        inputEl.value = "";
      }
    });

    document.getElementById("clear-done").addEventListener("click", clearDone);

    document.querySelectorAll(".filters button").forEach((btn) => {
      btn.addEventListener("click", () => {
        filter = btn.dataset.filter;
        document.querySelectorAll(".filters button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        render();
      });
    });

    // Başlangıçta görevleri yükle
    load();
  </script>
</body>
</html>
