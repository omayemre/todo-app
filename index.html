<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Uygulaması</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    header {
      padding: 24px;
      background: #5a4ba0;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 22px; }
    header .who { font-size: 12px; opacity: 0.85; margin-top: 4px; }
    #signout-btn {
      border: 1px solid rgba(255,255,255,0.5); background: none; color: #fff;
      padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    #signout-btn:hover { background: rgba(255,255,255,0.15); }

    /* --- Giriş / Kayıt ekranı --- */
    .auth { padding: 28px 24px; }
    .auth h2 { font-size: 18px; color: #333; margin-bottom: 6px; }
    .auth p.sub { font-size: 13px; color: #888; margin-bottom: 18px; }
    .auth label { display: block; font-size: 13px; color: #555; margin: 12px 0 4px; }
    .auth input {
      width: 100%; padding: 12px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 15px; outline: none;
    }
    .auth input:focus { border-color: #764ba2; }
    .auth .primary {
      width: 100%; margin-top: 18px; padding: 13px; border: none;
      background: #764ba2; color: #fff; border-radius: 8px; font-size: 15px; cursor: pointer;
    }
    .auth .primary:hover { background: #5a4ba0; }
    .auth .primary:disabled { opacity: 0.5; cursor: default; }
    .auth .toggle { margin-top: 16px; text-align: center; font-size: 13px; color: #888; }
    .auth .toggle a { color: #764ba2; cursor: pointer; text-decoration: underline; }

    /* --- Todo ekranı --- */
    .input-row { display: flex; gap: 8px; padding: 20px 24px; border-bottom: 1px solid #eee; }
    #new-task {
      flex: 1; padding: 12px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 15px; outline: none;
    }
    #new-task:focus { border-color: #764ba2; }
    #add-btn {
      padding: 12px 20px; border: none; background: #764ba2; color: #fff;
      border-radius: 8px; font-size: 15px; cursor: pointer;
    }
    #add-btn:hover { background: #5a4ba0; }
    #add-btn:disabled { opacity: 0.5; cursor: default; }

    .filters { display: flex; gap: 6px; padding: 14px 24px 0; }
    .filters button {
      border: none; background: none; color: #888; font-size: 13px;
      cursor: pointer; padding: 4px 10px; border-radius: 6px;
    }
    .filters button.active { background: #eee; color: #333; font-weight: 600; }

    ul { list-style: none; padding: 12px 24px; }
    li {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid #f2f2f2;
    }
    li input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #764ba2; }
    li .text { flex: 1; font-size: 15px; color: #333; word-break: break-word; }
    li.done .text { text-decoration: line-through; color: #aaa; }
    li .del { border: none; background: none; color: #d33; font-size: 18px; cursor: pointer; opacity: 0.6; }
    li .del:hover { opacity: 1; }

    .empty { text-align: center; color: #aaa; padding: 30px 0; font-size: 14px; }
    .error { color: #d33; background: #fdecea; margin: 16px 24px 0; padding: 10px 14px;
             border-radius: 8px; font-size: 13px; display: none; }

    footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px; border-top: 1px solid #eee; font-size: 13px; color: #888;
    }
    footer button { border: none; background: none; color: #d33; cursor: pointer; font-size: 13px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>📝 Yapılacaklar</h1>
        <div id="who" class="who hidden"></div>
      </div>
      <button id="signout-btn" class="hidden">Çıkış</button>
    </header>

    <div id="auth-error" class="error"></div>
    <div id="app-error" class="error"></div>

    <!-- GİRİŞ / KAYIT EKRANI -->
    <section id="auth-view" class="auth">
      <h2 id="auth-title">Giriş Yap</h2>
      <p class="sub" id="auth-sub">Görevlerine erişmek için giriş yap.</p>

      <label for="email">E-posta</label>
      <input id="email" type="email" placeholder="ornek@eposta.com" autocomplete="email" />

      <label for="password">Şifre</label>
      <input id="password" type="password" placeholder="En az 6 karakter" autocomplete="current-password" />

      <button id="auth-btn" class="primary">Giriş Yap</button>

      <div class="toggle" id="auth-toggle">
        Hesabın yok mu? <a id="toggle-link">Kayıt ol</a>
      </div>
    </section>

    <!-- TODO EKRANI -->
    <section id="todo-view" class="hidden">
      <div class="input-row">
        <input id="new-task" type="text" placeholder="Yeni görev yaz ve Enter'a bas..." autocomplete="off" />
        <button id="add-btn">Ekle</button>
      </div>

      <div class="filters">
        <button data-filter="all" class="active">Tümü</button>
        <button data-filter="active">Aktif</button>
        <button data-filter="done">Tamamlanan</button>
      </div>

      <ul id="list"></ul>

      <footer>
        <span id="count">0 görev</span>
        <button id="clear-done">Tamamlananları temizle</button>
      </footer>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Bu iki değer gizli değildir; güvenlik veritabanındaki RLS kurallarıyla sağlanır.
    const SUPABASE_URL = "https://mobnfzdtacxplyqijiss.supabase.co";
    const SUPABASE_KEY = "sb_publishable_rsvoFWaKlOYn-g3vo6Pf7Q_xcJxxgxi";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- DOM kısayolları ---
    const authView = document.getElementById("auth-view");
    const todoView = document.getElementById("todo-view");
    const authTitle = document.getElementById("auth-title");
    const authSub = document.getElementById("auth-sub");
    const authBtn = document.getElementById("auth-btn");
    const toggleWrap = document.getElementById("auth-toggle");
    const toggleLink = document.getElementById("toggle-link");
    const emailEl = document.getElementById("email");
    const passEl = document.getElementById("password");
    const authError = document.getElementById("auth-error");
    const appError = document.getElementById("app-error");
    const signoutBtn = document.getElementById("signout-btn");
    const whoEl = document.getElementById("who");

    const listEl = document.getElementById("list");
    const inputEl = document.getElementById("new-task");
    const countEl = document.getElementById("count");
    const addBtn = document.getElementById("add-btn");

    let mode = "signin"; // "signin" veya "signup"
    let todos = [];
    let filter = "all";

    function showErr(el, msg) { el.textContent = "Hata: " + msg; el.style.display = "block"; }
    function hideErr(el) { el.style.display = "none"; }

    // --- Kimlik doğrulama (auth) ---
    function setMode(m) {
      mode = m;
      hideErr(authError);
      if (m === "signin") {
        authTitle.textContent = "Giriş Yap";
        authSub.textContent = "Görevlerine erişmek için giriş yap.";
        authBtn.textContent = "Giriş Yap";
        toggleWrap.innerHTML = 'Hesabın yok mu? <a id="toggle-link">Kayıt ol</a>';
      } else {
        authTitle.textContent = "Kayıt Ol";
        authSub.textContent = "E-posta ve şifre ile yeni hesap oluştur.";
        authBtn.textContent = "Kayıt Ol";
        toggleWrap.innerHTML = 'Zaten hesabın var mı? <a id="toggle-link">Giriş yap</a>';
      }
      document.getElementById("toggle-link").addEventListener("click", () =>
        setMode(mode === "signin" ? "signup" : "signin"));
    }

    async function submitAuth() {
      const email = emailEl.value.trim();
      const password = passEl.value;
      if (!email || !password) { showErr(authError, "E-posta ve şifre gerekli."); return; }
      hideErr(authError);
      authBtn.disabled = true;
      const fn = mode === "signup"
        ? sb.auth.signUp({ email, password })
        : sb.auth.signInWithPassword({ email, password });
      const { error } = await fn;
      authBtn.disabled = false;
      if (error) { showErr(authError, error.message); return; }
      // Başarılıysa onAuthStateChange devreye girer.
    }

    authBtn.addEventListener("click", submitAuth);
    passEl.addEventListener("keydown", (e) => { if (e.key === "Enter") submitAuth(); });
    signoutBtn.addEventListener("click", () => sb.auth.signOut());

    // Giriş durumu değişince ekranı güncelle.
    sb.auth.onAuthStateChange((_event, session) => {
      if (session) {
        authView.classList.add("hidden");
        todoView.classList.remove("hidden");
        signoutBtn.classList.remove("hidden");
        whoEl.classList.remove("hidden");
        whoEl.textContent = session.user.email;
        load();
      } else {
        todoView.classList.add("hidden");
        signoutBtn.classList.add("hidden");
        whoEl.classList.add("hidden");
        authView.classList.remove("hidden");
        emailEl.value = ""; passEl.value = "";
        todos = [];
      }
    });

    // --- Todo işlemleri (RLS sayesinde otomatik olarak yalnızca kendi satırların) ---
    async function load() {
      const { data, error } = await sb.from("todos").select("*").order("created_at", { ascending: true });
      if (error) { showErr(appError, error.message); return; }
      hideErr(appError);
      todos = data;
      render();
    }

    async function addTodo(text) {
      text = text.trim();
      if (!text) return;
      addBtn.disabled = true;
      // user_id otomatik dolar (veritabanı varsayılanı auth.uid()).
      const { error } = await sb.from("todos").insert({ text });
      addBtn.disabled = false;
      if (error) { showErr(appError, error.message); return; }
      await load();
    }

    async function toggleTodo(id, done) {
      const { error } = await sb.from("todos").update({ done }).eq("id", id);
      if (error) { showErr(appError, error.message); return; }
      await load();
    }

    async function deleteTodo(id) {
      const { error } = await sb.from("todos").delete().eq("id", id);
      if (error) { showErr(appError, error.message); return; }
      await load();
    }

    async function clearDone() {
      const { error } = await sb.from("todos").delete().eq("done", true);
      if (error) { showErr(appError, error.message); return; }
      await load();
    }

    function render() {
      listEl.innerHTML = "";
      const visible = todos.filter((t) => {
        if (filter === "active") return !t.done;
        if (filter === "done") return t.done;
        return true;
      });

      if (visible.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Burada hiç görev yok.";
        listEl.appendChild(empty);
      }

      visible.forEach((t) => {
        const li = document.createElement("li");
        if (t.done) li.classList.add("done");

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = t.done;
        cb.addEventListener("change", () => toggleTodo(t.id, cb.checked));

        const span = document.createElement("span");
        span.className = "text";
        span.textContent = t.text;

        const del = document.createElement("button");
        del.className = "del";
        del.textContent = "×";
        del.title = "Sil";
        del.addEventListener("click", () => deleteTodo(t.id));

        li.append(cb, span, del);
        listEl.appendChild(li);
      });

      const remaining = todos.filter((t) => !t.done).length;
      countEl.textContent = remaining + " görev kaldı";
    }

    addBtn.addEventListener("click", () => { addTodo(inputEl.value); inputEl.value = ""; inputEl.focus(); });
    inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter") { addTodo(inputEl.value); inputEl.value = ""; } });
    document.getElementById("clear-done").addEventListener("click", clearDone);
    document.querySelectorAll(".filters button").forEach((btn) => {
      btn.addEventListener("click", () => {
        filter = btn.dataset.filter;
        document.querySelectorAll(".filters button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        render();
      });
    });

    setMode("signin");
  </script>
</body>
</html>
